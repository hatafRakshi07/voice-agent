; extensions.conf — Asterisk dialplan
;
; Incoming SIP calls are routed to the FastAGI server running in the
; backend container on port 4573.  The backend container is reachable
; on the Docker bridge network as "backend".
;
; FastAGI URI format: agi://host[:port][/script]
;   - host  = "backend" (Docker service name)
;   - port  = 4573 (FASTAGI_PORT in .env)
;   - /call = script identifier forwarded as agi_network_script

[globals]
FASTAGI_URI=agi://backend:4573/call

; ── Internal softphone calls to the AI agent ──────────────────────────────────
[from-internal]
; Dial "100" from a registered softphone to reach the AI agent
exten => 100,1,NoOp(Internal call to AI agent from ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,AGI(${FASTAGI_URI})
 same => n,Hangup()

; ── Incoming SIP calls from anonymous / trunk ─────────────────────────────────
[from-sip]
exten => _.,1,NoOp(Incoming call: ${CALLERID(all)} -> ${EXTEN})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,AGI(${FASTAGI_URI})
 same => n,Hangup()

; Catch-all for unmatched extension
exten => s,1,NoOp(Default handler)
 same => n,Answer()
 same => n,AGI(${FASTAGI_URI})
 same => n,Hangup()

; ── Voicemail / fallback ──────────────────────────────────────────────────────
[default]
exten => _.,1,Hangup()
