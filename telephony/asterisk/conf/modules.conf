; modules.conf — explicit module load list
; Only load what we actually need to keep the container footprint small.

[modules]
autoload=yes

; Explicitly forbid legacy Mongo-era modules we don't use
noload => chan_sip.so          ; use pjsip instead
noload => app_voicemail.so     ; not needed
noload => cdr_csv.so           ; using SQLite in backend
noload => cdr_manager.so

; Ensure these are loaded
load => res_pjsip.so
load => res_pjsip_session.so
load => chan_pjsip.so
load => res_agi.so
load => app_record.so
load => app_playback.so
load => app_stream_echo.so
load => codec_ulaw.so
load => codec_alaw.so
load => format_wav.so
load => format_wav_gsm.so
