; pjsip.conf — PJSIP channel driver (replaces legacy chan_sip)
;
; This file defines:
;   - A UDP transport on port 5060
;   - A SIP trunk "voiceagent" for receiving calls
;   - An example internal softphone endpoint "1000"
;
; For production, replace "secret" values and restrict "match" to your
; SIP provider's IP range.

; ── Transports ────────────────────────────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ── Indian SIP Trunk (Plivo / Exotel / Knowlarity) ───────────────────────────
; Replace the values below with credentials from your SIP provider.
;
; Plivo:    SIP Server = sip.plivo.com       Username/Password from SIP Trunks page
; Exotel:   SIP Server = sip.exotel.com      Username = your Exotel SID
; Twilio:   SIP Server = your-domain.sip.twilio.com
;
; Set these in your .env or docker-compose and reference via environment vars,
; OR replace the placeholder strings directly here.

[indian_trunk_auth]
type=auth
auth_type=userpass
username=YOUR_SIP_USERNAME       ; e.g. Plivo Auth ID / Exotel SID
password=YOUR_SIP_PASSWORD       ; e.g. Plivo Auth Token / Exotel Token

[indian_trunk_aor]
type=aor
contact=sip:YOUR_SIP_SERVER      ; e.g. sip:sip.plivo.com
qualify_frequency=30

[indian_trunk]
type=endpoint
transport=transport-udp
context=from-sip
allow=!all,ulaw,alaw
outbound_auth=indian_trunk_auth
aors=indian_trunk_aor
direct_media=no
from_domain=YOUR_SIP_SERVER      ; e.g. sip.plivo.com

[indian_trunk]
type=identify
endpoint=indian_trunk
match=YOUR_SIP_SERVER            ; IP or hostname of your SIP provider

[indian_trunk_registration]
type=registration
transport=transport-udp
outbound_auth=indian_trunk_auth
server_uri=sip:YOUR_SIP_SERVER
client_uri=sip:YOUR_SIP_USERNAME@YOUR_SIP_SERVER
retry_interval=60

; ── Fallback: anonymous local LAN calls ───────────────────────────────────────
[anonymous]
type=endpoint
context=from-sip
allow=!all,ulaw,alaw
direct_media=no
trust_id_inbound=yes

[anonymous]
type=identify
endpoint=anonymous
match=0.0.0.0/0

; ── Example internal softphone (optional) ────────────────────────────────────
; Use a SIP softphone (Linphone, Zoiper, etc.) to call the AI agent:
;   Server: <this host>:5060
;   Username: 1000 / Password: supersecret
[auth1000]
type=auth
auth_type=userpass
username=1000
password=supersecret

[aor1000]
type=aor
max_contacts=1
remove_existing=yes

[1000]
type=endpoint
context=from-internal
auth=auth1000
aors=aor1000
allow=!all,ulaw,alaw
direct_media=no
