# docker-compose.yml
# ───────────────────
# Fully-offline AI Voice Calling Agent
#
# Services:
#   ollama   - Local LLM server (Llama 3 / Mistral / etc.)
#   backend  - FastAPI + Whisper STT + Coqui XTTS + FastAGI server
#   asterisk - Asterisk 20 PBX (SIP telephony)
#   frontend - Next.js dashboard
#   nginx    - Reverse proxy (HTTP + WebSocket)
#
# First-run steps:
#   1. docker compose up -d ollama
#   2. docker exec -it voice_agent_ollama ollama pull llama3
#   3. docker compose up -d

services:

  # ── Ollama (local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: voice_agent_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voice_agent_backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # ── LLM Provider ──────────────────────────────────────────────────────
      # Change to "gemini" and set GEMINI_API_KEY to use Google Gemini
      - LLM_PROVIDER=ollama
      - OLLAMA_HOST=http://ollama:11434
      # Gemini (uncomment + set key to use Gemini instead of Ollama)
      # - LLM_PROVIDER=gemini
      # - GEMINI_API_KEY=your_gemini_api_key_here
      # - GEMINI_MODEL=gemini-1.5-flash
      # ── Telephony ─────────────────────────────────────────────────────────
      # Change to "android" for Android SIM gateway
      - TELEPHONY_PROVIDER=asterisk
      - FASTAGI_ENABLED=true
      - FASTAGI_HOST=0.0.0.0
      - FASTAGI_PORT=4573
      # Android gateway (uncomment if TELEPHONY_PROVIDER=android)
      # - ANDROID_GATEWAY_SECRET=your_shared_secret
      # ── STT ───────────────────────────────────────────────────────────────
      - WHISPER_MODEL=base
      - WHISPER_DEVICE=cpu
      # ── VAD ───────────────────────────────────────────────────────────────
      # Set to true to enable neural Silero VAD (better accuracy)
      - USE_SILERO_VAD=false
      - SILERO_VAD_THRESHOLD=0.5
      # ── TTS ───────────────────────────────────────────────────────────────
      - COQUI_TOS_AGREED=1
      # ── Database ──────────────────────────────────────────────────────────
      - SQLITE_PATH=/app/data/voice_agent.db
      - RECORDINGS_DIR=/app/recordings
    ports:
      - "8000:8000"   # FastAPI HTTP/WS
      - "4573:4573"   # FastAGI (Asterisk connects here)
    depends_on:
      - ollama
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/voices:/app/voices
      - ./backend/models:/app/models
      - backend_data:/app/data           # SQLite database
      - recordings:/app/recordings       # shared with Asterisk
      - whisper_cache:/root/.cache
      - tts_cache:/root/.local/share/tts

  # ── Asterisk PBX ──────────────────────────────────────────────────────────
  asterisk:
    build:
      context: ./telephony/asterisk
      dockerfile: Dockerfile
    container_name: voice_agent_asterisk
    restart: unless-stopped
    network_mode: host   # needed for RTP media to reach callers
    volumes:
      # Config files (read-only)
      - ./telephony/asterisk/conf/asterisk.conf:/etc/asterisk/asterisk.conf:ro
      - ./telephony/asterisk/conf/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./telephony/asterisk/conf/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./telephony/asterisk/conf/modules.conf:/etc/asterisk/modules.conf:ro
      - ./telephony/asterisk/conf/logger.conf:/etc/asterisk/logger.conf:ro
      # Recordings shared with backend
      - recordings:/var/spool/asterisk/recording
      # Asterisk logs
      - asterisk_logs:/var/log/asterisk
    depends_on:
      - backend

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voice_agent_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: voice_agent_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  ollama_data:
  backend_data:
  recordings:
  asterisk_logs:
  whisper_cache:
  tts_cache: